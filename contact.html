    <!-- Content -->
    <div class="container content">
        <h1>Contact Information</h1>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="contact-card">
                    <h3><strong>Barbara Louyakis</strong></h3>
                    <h3>Rochester, MA</h3>
                    <hr>
                    <h4>(508)612.9634</h4>
                    <h4><a href="mailto:bobbilouyakis@icloud.com">BobbiLouyakis@iCloud.com</a></h4>
                    <hr>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-4">
            <div class="col-md-6">
                <form id="contact-form" novalidate>
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" required />
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required />
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" required />
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="3" placeholder="Type message here..."></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send</button>
                </form>
                <p id="form-feedback" class="form-feedback"></p>
            </div>
        </div>
    </div>
